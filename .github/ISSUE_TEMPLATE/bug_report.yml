name: Bug report
description: Report a problem with the integration
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Important:** This integration is a UI wrapper around Home Assistant's built-in `google_assistant` integration. Please only report bugs with the UI card, entity exposure, or configuration flow — not with the underlying Google Assistant webhook, device sync, or voice command handling. Those are part of Home Assistant core.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2025.6.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the steps needed to trigger the bug
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. Enable debug logging for this integration if helpful.
      render: text
