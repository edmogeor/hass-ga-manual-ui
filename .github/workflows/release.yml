name: release

on:
  push:
    tags:
      - "v*"

permissions: {}

env:
  COMPONENT_DIR: custom_components/hass_ga_manual_ui
  ZIP_NAME: hass_ga_manual_ui.zip

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python tools
        run: pip install pyrefly ruff pytest pytest-asyncio pytest-homeassistant-custom-component homeassistant voluptuous

      - name: Install JS dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  release:
    name: Release
    needs: [hacs, hassfest, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Sync manifest version to release tag
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          tmp="$(mktemp)"
          jq --arg v "$version" '.version = $v' "$COMPONENT_DIR/manifest.json" > "$tmp"
          mv "$tmp" "$COMPONENT_DIR/manifest.json"
          echo "manifest version set to $version"

      # After the manifest sync, so esbuild bakes the release version into
      # __BUILD_VERSION__ (the bundle and manifest must report the same version,
      # else a freshly-loaded bundle would look "stale" and prompt a reload).
      - name: Build frontend bundle
        run: npm run build

      - name: Create release ZIP
        shell: bash
        run: |
          cd "$COMPONENT_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" . -x '*.pyc' -x '__pycache__/*'

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          notes="$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md)"
          # Trim leading and trailing blank lines.
          notes="$(printf '%s\n' "$notes" | sed -e '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')"
          if [ -z "$notes" ]; then
            echo "No CHANGELOG entry found for $version" >&2
            exit 1
          fi
          {
            echo "RELEASE_NOTES<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_ENV"

      - name: Create release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ env.RELEASE_NOTES }}
          files: ${{ env.ZIP_NAME }}
