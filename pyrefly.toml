project-includes = [
    "custom_components/google_assistant_manual/*.py",
]

project-excludes = [
    "**/references/**",
    ".venv/**",
]

search_path = [
    ".",
]

disable-search-path-heuristics = true

replace-imports-with-any = [
    "homeassistant.*",
    "voluptuous",
]

preset = "strict"
